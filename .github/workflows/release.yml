name: Build Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Read app version
        id: version
        shell: pwsh
        run: |
          $content = Get-Content app_version.py -Raw
          if ($content -match 'APP_VERSION\s*=\s*"([^"]+)"') {
            "version=$($Matches[1])" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          else {
            throw 'APP_VERSION could not be read from app_version.py'
          }

      - name: Validate tag version
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        run: |
          $expected = "v${{ steps.version.outputs.version }}"
          if ("${{ github.ref_name }}" -ne $expected) {
            throw "Tag version (${{ github.ref_name }}) does not match app_version.py ($expected)."
          }

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build portable app and installer
        shell: pwsh
        run: .\build.bat -AppVersion ${{ steps.version.outputs.version }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: yt-dlp-gui-windows-${{ steps.version.outputs.version }}
          path: |
            dist/yt-dlp GUI.exe
            dist/installer/yt-dlp-gui-setup-${{ steps.version.outputs.version }}.exe

      - name: Publish GitHub release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/yt-dlp GUI.exe
            dist/installer/yt-dlp-gui-setup-${{ steps.version.outputs.version }}.exe